<div class="network-container">
  <h1>Network</h1>
  <table mat-table [dataSource]="users$" class="network-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let user">
        <div class="name-cell">
          <app-avatar [firstName]="user.firstName" [lastName]="user.lastName"> </app-avatar>
          <span>{{ user.firstName }} {{ user.lastName }}</span>
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="headline">
      <th mat-header-cell *matHeaderCellDef>Headline</th>
      <td mat-cell *matCellDef="let user">
        <mat-icon appTechIcons [rowHeadline]="user.headline"></mat-icon>
        {{ user.headline }}
      </td>
    </ng-container>
    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef>Location</th>
      <td mat-cell *matCellDef="let user">{{ user.location }}</td>
    </ng-container>
    <ng-container matColumnDef="connections">
      <th mat-header-cell *matHeaderCellDef>Connections</th>
      <td mat-cell *matCellDef="let user">{{ user.connections }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      appHighlight
      [rowHeadline]="row.headline"
      *matRowDef="let row; columns: displayedColumns"
      class="table-row"
      (click)="onRowClick(row.id)"
    ></tr>
  </table>
</div>
