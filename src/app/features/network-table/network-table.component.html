<div class="network-container">
  <h1>Network</h1>
  <mat-form-field appearance="outline">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput [formControl]="searchControl" placeholder="Search users" />
  </mat-form-field>
  @if (loading$ | async) {
    <mat-spinner></mat-spinner>
  }
  <table mat-table [dataSource]="(users$ | async) ?? []" class="network-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let user">
        <div class="name-cell">
          <app-avatar [firstName]="user.firstName" [lastName]="user.lastName" />
          <span>{{ user.firstName }} {{ user.lastName }}</span>
        </div>
      </td>
    </ng-container>
    <ng-container matColumnDef="headline">
      <th mat-header-cell *matHeaderCellDef>Headline</th>
      <td mat-cell *matCellDef="let user">
        <mat-icon appTechIcons [rowSkills]="user.skills"></mat-icon>
        {{ user.headline }}
      </td>
    </ng-container>
    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef>Location</th>
      <td mat-cell *matCellDef="let user">{{ user.location }}</td>
    </ng-container>
    <ng-container matColumnDef="connections">
      <th mat-header-cell *matHeaderCellDef>Connections</th>
      <td mat-cell *matCellDef="let user">{{ user.connections }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      appHighlight
      [rowHeadline]="row.headline"
      *matRowDef="let row; columns: displayedColumns"
      class="table-row"
      (click)="onRowClick(row.id)"
    ></tr>
  </table>
  <mat-paginator
    [length]="(totalItems$ | async) ?? 0"
    [pageSize]="(currentPreferences$ | async)?.pagination?.pageSize ?? 10"
    [pageIndex]="((currentPreferences$ | async)?.pagination?.pageNumber ?? 1) - 1"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPageChange($event)"
  >
  </mat-paginator>
</div>
