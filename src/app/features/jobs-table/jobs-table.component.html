<div class="jobs-container">
  <h1>Jobs</h1>

  <mat-form-field appearance="outline">
    <mat-icon matPrefix>search</mat-icon>
    <input matInput [formControl]="searchControl" placeholder="Search jobs" />
  </mat-form-field>

  <table mat-table [dataSource]="(data$ | async)?.data ?? []" class="jobs-table">
    <ng-container matColumnDef="job">
      <th mat-header-cell *matHeaderCellDef>Job</th>
      <td mat-cell *matCellDef="let job">
        <div class="job-info">
          <mat-icon>business</mat-icon>
          <div>
            <div class="job-title">{{ job.title }}</div>
            <div class="company-name">{{ job.company.name }}</div>
          </div>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef>Location</th>
      <td mat-cell *matCellDef="let job">{{ job.location }}</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let job">
        <span class="job-type">{{ job.type }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="posted">
      <th mat-header-cell *matHeaderCellDef>Posted</th>
      <td mat-cell *matCellDef="let job">{{ job.createdAt | date: 'MMM d, yyyy' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns" class="table-row"></tr>
  </table>

  <mat-paginator
    [length]="(data$ | async)?.pagination?.totalItems ?? 0"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPageChange($event)"
  >
  </mat-paginator>
</div>
